server {
    listen 80;
    server_name aideliverygroceryshop.cloudaura.cloud;

    # Frontend (Next.js)
    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # C# API
    location /api/v1/ {
        proxy_pass http://127.0.0.1:8020/api/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health endpoint
    location /health {
        proxy_pass http://127.0.0.1:8020/health;
    }

    # Swagger
    location /swagger {
        proxy_pass http://127.0.0.1:8020/swagger;
    }

    # AI Service (chat + embeddings)
    location /api/chat {
        proxy_pass http://127.0.0.1:8021/api/chat;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_read_timeout 120s;
    }

    location /api/embeddings {
        proxy_pass http://127.0.0.1:8021/api/embeddings;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Metrics
    location /metrics {
        proxy_pass http://127.0.0.1:8020/metrics;
    }
}
