services:
  grocery-db:
    image: postgres:16-alpine
    container_name: grocery-db
    restart: unless-stopped
    mem_limit: 512m
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-groceryshop}
      POSTGRES_USER: ${POSTGRES_USER:-grocery}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "127.0.0.1:5436:5432"
    volumes:
      - grocery_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-grocery}"]
      interval: 10s
      timeout: 5s
      retries: 5

  grocery-redis:
    image: redis:7-alpine
    container_name: grocery-redis
    restart: unless-stopped
    mem_limit: 128m
    ports:
      - "127.0.0.1:6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  grocery-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: grocery-api
    restart: unless-stopped
    mem_limit: 512m
    ports:
      - "127.0.0.1:8020:8000"
    env_file: .env
    environment:
      - POSTGRES_HOST=grocery-db
      - POSTGRES_PORT=5432
      - REDIS_HOST=grocery-redis
      - REDIS_PORT=6379
      - AI_SERVICE_URL=http://grocery-ai:8000
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://172.17.0.1:4317}
    depends_on:
      grocery-db:
        condition: service_healthy
      grocery-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  grocery_pgdata:
