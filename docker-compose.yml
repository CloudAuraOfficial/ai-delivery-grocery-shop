services:
  grocery-db:
    image: postgres:16-alpine
    container_name: grocery-db
    restart: unless-stopped
    mem_limit: 512m
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-groceryshop}
      POSTGRES_USER: ${POSTGRES_USER:-grocery}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "127.0.0.1:5436:5432"
    volumes:
      - grocery_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-grocery}"]
      interval: 10s
      timeout: 5s
      retries: 5

  grocery-redis:
    image: redis:7-alpine
    container_name: grocery-redis
    restart: unless-stopped
    mem_limit: 128m
    ports:
      - "127.0.0.1:6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  grocery-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: grocery-api
    restart: unless-stopped
    mem_limit: 512m
    ports:
      - "127.0.0.1:8020:8000"
    env_file: .env
    environment:
      - POSTGRES_HOST=grocery-db
      - POSTGRES_PORT=5432
      - REDIS_HOST=grocery-redis
      - REDIS_PORT=6379
      - AI_SERVICE_URL=http://grocery-ai:8000
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://172.17.0.1:4317}
    depends_on:
      grocery-db:
        condition: service_healthy
      grocery-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  grocery-ai:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: grocery-ai
    restart: unless-stopped
    mem_limit: 1g
    ports:
      - "127.0.0.1:8021:8000"
    env_file: .env
    environment:
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama-shared:11434}
      - QDRANT_URL=${QDRANT_URL:-http://n8n-qdrant:6333}
      - POSTGRES_HOST=grocery-db
      - POSTGRES_PORT=5432
      - REDIS_HOST=grocery-redis
      - REDIS_PORT=6379
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://172.17.0.1:4317}
    networks:
      - default
      - ollama-net
      - n8n_default
    depends_on:
      grocery-db:
        condition: service_healthy
      grocery-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3

  grocery-web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: grocery-web
    restart: unless-stopped
    mem_limit: 512m
    ports:
      - "127.0.0.1:3002:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-/api/v1}
      - NEXT_PUBLIC_CHAT_URL=${NEXT_PUBLIC_CHAT_URL:-/api}
    depends_on:
      - grocery-api

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    container_name: grocery-azurite
    restart: unless-stopped
    mem_limit: 256m
    ports:
      - "127.0.0.1:10000:10000"
      - "127.0.0.1:10001:10001"
      - "127.0.0.1:10002:10002"
    volumes:
      - azurite_data:/data
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "10001"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  default:
  ollama-net:
    external: true
  n8n_default:
    external: true

volumes:
  grocery_pgdata:
  azurite_data:
